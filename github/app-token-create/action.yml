name: "Create GitHub App Token"
description: "Decodes a base64-encoded private key and generates a GitHub App token"

inputs:
  app_id:
    description: "GitHub App ID"
    required: true
  base64_encoded_private_key:
    description: "Base64-encoded GitHub App private key"
    required: true
  owner:
    description: "GitHub repository owner"
    required: false
    default: ${{ github.repository_owner }}
  repositories:
    description: "Repositories to grant access to (optional)"
    required: false
    default: ""

outputs:
  token:
    description: "GitHub App token"
    value: ${{ steps.app-token.outputs.token }}

runs:
  using: "composite"
  steps:
    - name: Decode base64-encoded private key
      id: decode-private-key
      shell: bash
      env:
        BASE64_ENCODED_PRIVATE_KEY: ${{ inputs.base64_encoded_private_key }}
      run: |
        # Disable command tracing to prevent key from being printed
        set -euo pipefail
        set +x

        # Decode the base64-encoded private key (stored as base64 in AWS
        # Secrets Manager because its key/value mode does not handle line breaks)
        BASE64_DECODED_PRIVATE_KEY=$(echo -n "$BASE64_ENCODED_PRIVATE_KEY" | base64 -d)

        # Register the decoded PEM key with the runner's log-redaction filter.
        # ::add-mask:: is a single-line workflow command, so multiline values
        # must be encoded: %25 for %, %0D for \r, %0A for \n — matching the
        # escapeData logic in @actions/core. A single atomic mask avoids
        # false-positive redaction of short base64 fragments that could match
        # unrelated log lines.
        echo "::add-mask::$(echo "$BASE64_DECODED_PRIVATE_KEY" | sed ':a;N;$!ba;s/%/%25/g' | sed ':a;N;$!ba;s/\r/%0D/g' | sed ':a;N;$!ba;s/\n/%0A/g')"

        # Pass decoded key to the next step via GITHUB_OUTPUT (multiline heredoc)
        {
          echo "decoded_private_key<<PRIVATE_KEY_EOF"
          printf '%s\n' "$BASE64_DECODED_PRIVATE_KEY"
          echo "PRIVATE_KEY_EOF"
        } >> $GITHUB_OUTPUT 2>/dev/null

        # Clear variables from shell namespace
        unset BASE64_ENCODED_PRIVATE_KEY
        unset BASE64_DECODED_PRIVATE_KEY

    - name: Generate GitHub App token
      id: app-token
      uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
      with:
        app-id: ${{ inputs.app_id }}
        private-key: ${{ steps.decode-private-key.outputs.decoded_private_key }}
        owner: ${{ inputs.owner }}
        repositories: ${{ inputs.repositories }}
